  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    #premium-loader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .dark #premium-loader {
      background: #0a0a0f;
    }

    @media (prefers-color-scheme: dark) {
      #premium-loader { background: #0a0a0f; }
    }

    #premium-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .loader-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .loader-spinner {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .loader-spinner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .loader-spinner-ring:nth-child(1) {
      border-top-color: #3b82f6;
      animation: spin 0.8s linear infinite;
    }

    .loader-spinner-ring:nth-child(2) {
      inset: 6px;
      border-right-color: #8b5cf6;
      animation: spin 1s linear infinite reverse;
    }

    .loader-spinner-ring:nth-child(3) {
      inset: 12px;
      border-bottom-color: #06b6d4;
      animation: spin 0.6s linear infinite;
    }

    .loader-bar-track {
      width: 200px;
      height: 3px;
      background: rgba(59,130,246,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
      border-radius: 2px;
      animation: loaderFill 1.2s ease-in-out forwards;
    }

    .loader-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: loaderPulse 1.5s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes loaderFill {
      0% { width: 0; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes loaderPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      z-index: 99999;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4, #10b981);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 0.1s linear;
      pointer-events: none;
    }

    #custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 999999;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, opacity 0.2s;
      opacity: 0;
    }

    @media (hover: none) and (pointer: coarse) {
      #custom-cursor { display: none; }
    }
  </style>

<body>
  <div id="premium-loader">
    <div class="loader-content">
      <div class="loader-logo">Ahamad</div>
      <div class="loader-spinner">
        <div class="loader-spinner-ring"></div>
        <div class="loader-spinner-ring"></div>
        <div class="loader-spinner-ring"></div>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
      <div class="loader-text">Loading</div>
    </div>
  </div>

  <div id="scroll-progress"></div>
  <div id="custom-cursor"></div>
  <div id="root"></div>

  <script>
    (function() {
      var saved = localStorage.getItem('theme') || 'light';
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>


  <script>
    var loader = document.getElementById('premium-loader');
    window.addEventListener('load', function() {
      setTimeout(function() {
        loader.classList.add('hidden');
        setTimeout(function() { loader.style.display = 'none'; }, 600);
      }, 1000);
    });

    var progressBar = document.getElementById('scroll-progress');
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? scrollTop / docHeight : 0;
      progressBar.style.transform = 'scaleX(' + progress + ')';
    });

    var cursor = document.getElementById('custom-cursor');
    var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (!isTouch) {
      document.addEventListener('mousemove', function(e) {
        cursor.style.opacity = '1';
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      document.addEventListener('mouseleave', function() {
        cursor.style.opacity = '0';
      });
      document.addEventListener('mouseenter', function() {
        cursor.style.opacity = '1';
      });
      document.querySelectorAll('a, button, [role="button"], input, textarea').forEach(function(el) {
        el.addEventListener('mouseenter', function() {
          cursor.style.width = '40px';
          cursor.style.height = '40px';
          cursor.style.background = 'radial-gradient(circle, rgba(139,92,246,0.4), transparent)';
        });
        el.addEventListener('mouseleave', function() {
          cursor.style.width = '20px';
          cursor.style.height = '20px';
          cursor.style.background = 'radial-gradient(circle, rgba(59,130,246,0.3), transparent)';
        });
      });
    }
  </script>
</body>
